#
# cargo-deny policy for the GaussMatrix server (GaussInteract-SPECS §VI.C):
# every merge is gated on cargo audit (advisories) and cargo deny (licence and
# dependency policy), with a pinned tree and reproducible builds.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
